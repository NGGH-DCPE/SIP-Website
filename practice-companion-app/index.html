document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n            <div style=\"flex:0 0 auto; display:flex; gap:8px; padding:10px 14px 14px; border-top:1px solid #e3e5eb;\">\n              <input ref=\"{{ pipInputRef }}\" placeholder=\"Ask Pip anything…\" sc-camel-on-key-down=\"{{ handlePipInputKey }}\" style=\"flex:1; border:1px solid #e3e5eb; border-radius:12px; padding:11px 13px; font-size:13.5px; font-family:inherit; outline:none;\">\n              <button style=\"width:42px; height:42px; border-radius:12px; background:#f4f5f8; color:#5b6070; border:1px solid #e3e5eb; cursor:pointer; font-size:16px;\" sc-camel-on-click=\"{{ onVoiceMicClick }}\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9.5\" y=\"2.5\" width=\"5\" height=\"9.5\" rx=\"2.5\"><\u002Frect><path d=\"M6 11a6 6 0 0 0 12 0\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><line x1=\"9\" y1=\"21\" x2=\"15\" y2=\"21\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n              <button style=\"width:42px; height:42px; border-radius:12px; background:#2f6fed; color:#fff; border:none; cursor:pointer; font-size:16px;\" sc-camel-on-click=\"{{ clickPipSend }}\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"21\" y1=\"3\" x2=\"10.5\" y2=\"13.5\"><\u002Fline><path d=\"M21 3 14.5 21l-4-7.5L3 9.5 21 3z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ voiceListening }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; inset:0; z-index:80; background:rgba(18,20,28,0.92); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;\">\n            <div style=\"position:relative; width:88px; height:88px; display:flex; align-items:center; justify-content:center;\">\n              <div style=\"position:absolute; inset:0; border-radius:50%; background:rgba(79,127,255,0.35); animation:voicePulse 1.4s ease-out infinite;\"><\u002Fdiv>\n              <div style=\"position:absolute; inset:0; border-radius:50%; background:rgba(79,127,255,0.35); animation:voicePulse 1.4s ease-out infinite; animation-delay:0.4s;\"><\u002Fdiv>\n              <div style=\"position:relative; width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#6f97ff,#2f6fed); display:flex; align-items:center; justify-content:center; color:#fff;\">\n                <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9.5\" y=\"2.5\" width=\"5\" height=\"9.5\" rx=\"2.5\"><\u002Frect><path d=\"M6 11a6 6 0 0 0 12 0\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><line x1=\"9\" y1=\"21\" x2=\"15\" y2=\"21\"><\u002Fline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:14px; font-weight:600; color:#fff;\">Listening…<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#aab0c4; max-width:220px; text-align:center;\">This is a demo of voice input — Pip will answer as if you'd spoken.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:0 0 auto; display:flex; background:#fff; border-top:1px solid #e3e5eb; padding:7px 6px 16px;\">\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 2px; cursor:pointer; color:{{ navHomeColor }};\" sc-camel-on-click=\"{{ goHomePractice }}\">\n            <svg width=\"21\" height=\"21\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10.8 12 4l8 6.8\"><\u002Fpath><path d=\"M5.8 9.5V19a1 1 0 0 0 1 1h3.7v-5.5h3v5.5h3.7a1 1 0 0 0 1-1V9.5\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:10.5px; font-weight:600;\">{{ t_nav_home }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 2px; cursor:pointer; color:{{ navPayColor }};\" sc-camel-on-click=\"{{ goBankHomePractice }}\">\n            <svg width=\"21\" height=\"21\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 8h13l-3.5-3.5\"><\u002Fpath><path d=\"M20 16H7l3.5 3.5\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:10.5px; font-weight:600;\">{{ t_nav_pay }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 2px; cursor:pointer; color:{{ navWellnessColor }};\" sc-camel-on-click=\"{{ goWellnessHomePractice }}\">\n            <svg width=\"21\" height=\"21\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2.5 13.9 8.6 20 10.5 13.9 12.4 12 18.5 10.1 12.4 4 10.5 10.1 8.6 12 2.5z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:10.5px; font-weight:600;\">{{ t_nav_wellness }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 2px; cursor:pointer; color:#9299a8;\" sc-camel-on-click=\"{{ goHomePractice }}\">\n            <svg width=\"21\" height=\"21\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"5.5\" cy=\"12\" r=\"1.6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.6\"><\u002Fcircle><circle cx=\"18.5\" cy=\"12\" r=\"1.6\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-size:10.5px; font-weight:600;\">More<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst LANGS = ['English','Mandarin','Malay','Tamil'];\n\nconst PAYEES = [\n  {id:'mei', name:'Mei Ling Tan', mobile:'9123 4567', color:'#4f7fff', initials:'ML'},\n  {id:'ahmad', name:'Ahmad bin Hassan', mobile:'8876 2210', color:'#137a4f', initials:'AH'},\n  {id:'bedric', name:'Bedric (Grandson)', mobile:'9045 7734', color:'#c2410c', initials:'B'},\n];\n\nconst VOUCHER_TIERS = [\n  {threshold:20, reward:'$5 NTUC FairPrice e-voucher'},\n  {threshold:40, reward:'$5 Sheng Siong e-voucher'},\n  {threshold:60, reward:'Free Active Ageing Centre class pass'},\n  {threshold:100, reward:'$10 hawker centre voucher'},\n];\n\nconst SCAM_ALERTS = [\n  {date:'18 Jun 2026', source:'Singapore Police Force', title:'Scammers target seniors with fake activity ads',\n   summary:\"Police warned that scammers are posting ads on Facebook and TikTok offering activities for seniors. After signing up, victims are asked over WhatsApp to install a file that secretly removes their Singpass and ScamShield apps and raises their bank transfer limits.\",\n   tip:\"Never install an app or file sent to you by someone you met through an online ad, even if it looks official.\"},\n  {date:'07 Jul 2026', source:'Singapore Police Force', title:'Police and banks stop over 600 scam attempts in two months',\n   summary:\"A joint operation between the Anti-Scam Centre and five major banks disrupted over 600 scam attempts and prevented more than $38 million in losses, largely by flagging suspicious transfers before money left victims' accounts.\",\n   tip:\"Banks may sometimes pause or call to check a transfer that looks unusual — this is a protection, not an error.\"},\n  {date:'Ongoing', source:'ScamShield.gov.sg', title:'Remember the ACT framework',\n   summary:\"Add security features like ScamShield and transaction limits. Check any suspicious message or call carefully before acting. Tell your bank, family, or the police if something feels wrong.\",\n   tip:\"When in doubt, call the 24/7 ScamShield Helpline at 1799 before doing anything else.\"},\n];\n\nconst SCAM_EXAMPLES = [\n  {channel:'SMS', from:'\"Bank-Notice\"', isScam:true, message:\"Your account will be suspended today. Verify now to avoid closure: bit.ly/acct-verify-sg\",\n   flags:[\n     {text:'suspended today', reason:'Creates urgency so you act before thinking it through.'},\n     {text:'Verify now', reason:\"Pressures you to act immediately — real banks don't rush you.\"},\n     {text:'bit.ly/acct-verify-sg', reason:'A shortened link hides the real address.'},\n   ]},\n  {channel:'WhatsApp', from:'+65 9123 4567 (Mei Ling, saved contact)', isScam:false, message:\"Hi Auntie! Reminder we're meeting at Tiong Bahru Market 10am Saturday for breakfast. Let me know if that still works for you!\",\n   flags:[\n     {text:'Mei Ling, saved contact', reason:\"From someone already in your contacts — not an unknown number.\"},\n     {text:'Let me know if that still works for you', reason:\"Asks, doesn't pressure — no urgency, no links, no request for money or details.\"},\n   ]},\n  {channel:'WhatsApp', from:'+62 812 XXX XXXX (unknown number)', isScam:true, message:\"Congratulations! You've won a $500 FairPrice voucher. Claim within 24 hours: bit.ly/claim-voucher-now\",\n   flags:[\n     {text:\"Congratulations! You've won\", reason:\"Too good to be true — you didn't enter any contest.\"},\n     {text:'within 24 hours', reason:'A tight deadline pushes you to click before checking.'},\n     {text:'bit.ly/claim-voucher-now', reason:\"A shortened link — legitimate vouchers don't need one.\"},\n   ]},\n  {channel:'SMS', from:'\"DHL\"', isScam:false, message:\"Your DHL parcel (tracking 6612XXYZ) is out for delivery today. Track at dhl.com or call our hotline if you have questions.\",\n   flags:[\n     {text:'dhl.com', reason:'A real, recognisable domain — not a shortened or misspelled link.'},\n     {text:'call our hotline if you have questions', reason:\"Gives you a way to verify independently, doesn't ask you to click urgently or share personal details.\"},\n   ]},\n  {channel:'Phone call transcript', from:'\"Officer Tan, Singapore Police\"', isScam:true, message:\"Your bank account is under investigation for money laundering. To protect your funds, transfer them immediately to this safe account.\",\n   flags:[\n     {text:'Officer Tan, Singapore Police', reason:'Impersonating an authority to make you afraid and obedient.'},\n     {text:'under investigation', reason:'Fear-based pressure — a classic scam tactic.'},\n     {text:'transfer them immediately to this safe account', reason:'No real police officer will ever ask you to transfer money. This is the biggest red flag of all.'},\n   ]},\n];\n\nconst CHIPS_BY_SCREEN = {\n  'home': [\"What can I practise here?\", \"Is my information safe?\"],\n  'bank-home': [\"What's a mobile number transfer?\", \"Where do I find the account number?\"],\n  'paynow-verify': [\"Why can't I see the full name?\", \"What if the name looks wrong?\"],\n  'bank-amount': [\"Is this real money?\", \"What if I enter the wrong amount?\"],\n  'bank-review': [\"Why don't I see the bank name?\", \"Is this safe?\"],\n  'bank-success': [\"Can I undo this?\", \"How do I do a real transfer now?\"],\n  'qr-scan': [\"How do I know it's a real shop?\", \"What if the QR looks weird?\"],\n  'qr-merchant': [\"What does 'verified' mean?\", \"Is this safe?\"],\n  'qr-success': [\"What if I paid the wrong amount?\"],\n  'scam-quiz': [\"What is phishing?\", \"How do scammers trick people?\"],\n  'wellness-home': [\"What is A.C.T.?\", \"Where does this news come from?\"],\n  'wellness-news': [\"What is A.C.T.?\", \"Should I call 1799?\"],\n  'check-message': [\"What does 'medium risk' mean?\", \"What is ScamShield?\"],\n  'rewards': [\"How do I earn more points?\", \"Who pays for the vouchers?\"],\n  'live-qr': [\"Is this the real app now?\", \"Is this safe?\"],\n};\n\nconst RULES = [\n  {keys:['otp','one time password','one-time','code'], reply:\"An OTP is a 6-digit code sent by SMS to prove it's really you. Never share it with anyone, even someone who says they're calling from your bank — banks never ask for it.\"},\n  {keys:['safe','trust','sure','scared','afraid','worried'], reply:\"Good instinct to pause and check. In practice mode nothing here is real. In real life: check the name matches before you confirm, and remember — nothing is sent until you tap the final Confirm button.\"},\n  {keys:['cancel','undo','mistake','wrong','fix'], reply:\"You can cancel any transfer right up until you tap the final Confirm button — nothing leaves your account before that. If something's already gone through in real life, contact your bank's hotline immediately.\"},\n  {keys:['scam','fraud','fake','phishing','trick'], reply:\"A common trick is creating urgency — 'act now or your account will be suspended.' Real banks don't rush you like that. When in doubt, hang up and call the number on the back of your card yourself.\"},\n  {keys:['ai','artificial intelligence'], reply:\"AI tools can be genuinely helpful, but they can also get things wrong sometimes. It's a good habit to double-check anything important.\"},\n  {keys:['fee','cost','charge','money'], reply:\"Most PayNow transfers between local banks are free. Other transfer types may show a small fee before you confirm — always check the review screen first.\"},\n  {keys:['add','new person','new payee'], reply:\"In practice mode, adding a new payee is turned off so you can focus on the safe part first — checking details before sending.\"},\n  {keys:['verified','verify','merchant','shop','real shop'], reply:\"A verified badge means the shop's registered name matched the QR code. Always check the name on screen matches the shop in front of you.\"},\n  {keys:['understand','speak','language'], reply:\"You can switch my language anytime from the home screen — tap the language pill near the bottom.\"},\n  {keys:['full name','see the name','wrong name','masked'], reply:\"PayNow only shows part of the name on purpose — a privacy feature so strangers can't see your full name from just your mobile number.\"},\n  {keys:['bank name','account number','which bank'], reply:\"PayNow deliberately doesn't show the recipient's bank or account number — you only need their mobile number or NRIC.\"},\n  {keys:['mobile number transfer','what is paynow','proxy'], reply:\"PayNow lets you send money using just a mobile number or NRIC instead of a bank account number, and looks up the linked name so you can double-check before sending.\"},\n  {keys:['a.c.t','act framework','what is act'], reply:\"A.C.T. is the official framework from the Singapore Police and ScamShield: Add security features, Check for scam signs, Tell someone if something feels wrong.\"},\n  {keys:['1799','scamshield helpline','call the helpline'], reply:\"1799 is the free, 24-hour ScamShield Helpline.\"},\n  {keys:['scamshield app','what is scamshield'], reply:\"ScamShield is the official government app that checks calls, SMSes, and links for known scams.\"},\n  {keys:['medium risk','risk mean','risk level'], reply:\"Medium risk means the message has one or two warning signs but isn't clearly a scam. When in doubt, don't click anything and check with someone you trust.\"},\n  {keys:['earn more points','how do i earn','get points'], reply:\"You earn points by completing practice sessions — a bank transfer, a QR payment, or correctly spotting a scam message.\"},\n  {keys:['pays for the vouchers','who pays','voucher sponsor'], reply:\"The vouchers would be sponsored by community partners, like your local CDC or Residents' Committee.\"},\n  {keys:['where does this news come from','news source','who writes'], reply:\"These alerts are simplified from real advisories published by the Singapore Police Force and ScamShield.gov.sg.\"},\n];\n\nconst FLOWS = [\n  {id:'home', label:'Home', note:'Sarah picks a task rather than being taught in the abstract.'},\n  {id:'bank-home', label:'PayNow — enter mobile number', note:'Real PayNow uses a mobile number/NRIC lookup, not just a saved list.'},\n  {id:'paynow-verify', label:'PayNow — verify masked name', note:\"Mirrors PayNow's actual privacy feature: only part of the name is shown.\"},\n  {id:'qr-merchant', label:'QR payment — verify merchant', note:'Shows the shop name check before paying.'},\n  {id:'scam-quiz', label:'Spot the scam', note:'Framed as discernment, not fear.'},\n  {id:'wellness-news', label:'Digital wellness — scam alerts', note:'Real, current SPF/ScamShield advisories, simplified.'},\n  {id:'check-message', label:'Digital wellness — check a message', note:\"Answers: I can't tell a scam message from a real one.\"},\n  {id:'rewards', label:'Rewards', note:'Grocery vouchers tied to practice, sponsored by community partners.'},\n  {id:'live-qr', label:'Live mode — real task', note:'The payoff: same guidance appears lightly on the real app.'},\n];\n\nfunction maskName(full){\n  return full.split(' ').map(word=>{\n    if(word.length<=2) return word;\n    const clean = word.replace(/[()]/g,'');\n    if(clean.length<=2) return word;\n    return clean[0] + '*'.repeat(clean.length-2) + clean[clean.length-1];\n  }).join(' ');\n}\nfunction escapeRegex(s){ return s.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&'); }\nfunction segmentText(text, flags){\n  if(!flags || !flags.length) return [{text, isText:true, isMark:false, key:'t0'}];\n  let ranges = [];\n  flags.forEach((f,i)=>{\n    const re = new RegExp(escapeRegex(f.text),'i');\n    const m = text.match(re);\n    if(m) ranges.push({start:m.index, end:m.index+m[0].length, n:i+1});\n  });\n  ranges.sort((a,b)=>a.start-b.start);\n  const segs = [];\n  let pos = 0;\n  ranges.forEach((r,i)=>{\n    if(r.start>pos) segs.push({text:text.slice(pos,r.start), isText:true, isMark:false, key:'t'+i});\n    segs.push({text:text.slice(r.start,r.end), isText:false, isMark:true, key:'m'+i});\n    pos = r.end;\n  });\n  if(pos<text.length) segs.push({text:text.slice(pos), isText:true, isMark:false, key:'tend'});\n  return segs;\n}\nfunction heuristicCheck(raw){\n  const patterns = [\n    {re:/singpass|\\biras\\b|\\bica\\b|\\bcpf\\b|ministry of|government of/i, reason:\"Impersonates a government agency — real notices don't use alarming, urgent language like this.\"},\n    {re:/otp|password|\\bpin\\b|nric|bank account|card number/i, reason:'Real organisations never ask for this over a message.'},\n    {re:/suspend(ed)?|expire[sd]?|flagged for/i, reason:'Warns of a bad consequence to make you act before thinking it through.'},\n    {re:/immediately|act now|within \\d+\\s*(hour|hr|minute)s?|\\btoday\\b/i, reason:'Puts a tight deadline on you — a classic pressure tactic.'},\n    {re:/(https?:\\/\\/|www\\.)\\S+|\\b[a-z0-9-]+\\.(net|com|org|info|xyz|top|gov|sg|cn)\\b(\\/\\S*)?/i, reason:'A link like this can lead somewhere fake — go to the official app or site yourself instead of tapping it.'},\n    {re:/won|prize|claim\\b|gift card|voucher/i, reason:'Too-good-to-be-true rewards are a common lure.'},\n    {re:/verify (your|now)|confirm your|update your details|wire transfer/i, reason:'A phrase commonly used to pressure you into acting fast.'},\n  ];\n  const flags = [];\n  patterns.forEach(p=>{ const m=raw.match(p.re); if(m) flags.push({text:m[0], reason:p.reason}); });\n  let level, label;\n  if(flags.length>=2){ level='high'; label='Likely a scam'; }\n  else if(flags.length===1){ level='medium'; label='Be cautious'; }\n  else { level='low'; label='No obvious red flags'; }\n  return {level, label, flags: flags.slice(0,4), raw, source:'offline',\n    pipNote: le ்த்தீர்கள்.\",\n    success_to:\"பெறுநர்\", success_amount:\"தொகை\", success_ref:\"குறிப்பு எண்\",\n    success_privacy:\"உங்கள் உண்மையான அறிக்கையில், இது \\\"CAS\\\" மற்றும் பெறுநர் பெயருடன் காட்டப்படும் — இது இயல்பானது.\",\n    success_guide:\"உறுதிப்படுத்தும் முன் பெயரையும் தொகையையும் சரிபார்த்தீர்கள் — இதுவே முக்கியமான பழக்கம்.\",\n    practise_again:\"மீண்டும் பயிற்சி செய்க\", done_btn:\"முடிந்தது\",\n    title_send_money:\"பணம் அனுப்பு\", title_verify_recipient:\"பெறுநரை சரிபார்க்க\", title_enter_amount:\"தொகையை உள்ளிடவும்\", title_review_transfer:\"பரிமாற்றத்தை சரிபார்க்க\",\n    title_scan_pay:\"ஸ்கேன் செய்து செலுத்து\", title_confirm_payment:\"கொடுப்பனவை உறுதிப்படுத்து\", title_spot_scam:\"மோசடியை கண்டறியுங்கள்\", title_digital_wellness:\"டிஜிட்டல் நல்வாழ்வு\", title_scam_alerts:\"மோசடி எச்சரிக்கைகள்\", title_check_message:\"செய்தியை சரிபார்க்க\", title_rewards:\"வெகுமதிகள்\",\n    scan_hint:\"உங்கள் கேமராவை QR குறியீட்டை நோக்கி வைக்கவும்\", scan_guide:\"இது ஒரு பயிற்சி ஸ்கேன். நிஜத்தில், செலுத்தும் முன் திரையில் கடையின் பெயர் தோன்றுவதை எப்போதும் சரிபார்க்கவும் — லோகோ மட்டும் அல்ல.\",\n    cancel_btn:\"ரத்து செய்\", simulate_btn:\"ஸ்கேனை உருவகப்படுத்து\", verified_merchant:\"சரிபார்க்கப்பட்ட வணிகர்\", qr_reference_label:\"குறிப்பு எண்\",\n    qr_guide:\"கடையின் பெயர் கவுண்டர் பலகையுடன் பொருந்துகிறது, மேலும் சரிபார்க்கப்பட்டதாக குறிக்கப்பட்டுள்ளது. அதுவே சரிபார்ப்பு — முதலில் பெயர், பின்னர் தொகை, ஒவ்வொரு முறையும்.\", pay_btn:\"செலுத்து\",\n    qr_success_title:\"கொடுப்பனவு பயிற்சி முடிந்தது\", qr_success_sub:\"செலுத்தும் முன் வணிகர் பெயரை சரிபார்த்தீர்கள் — போலி QR ஒட்டுகளிலிருந்து உங்களை பாதுகாக்கும் பழக்கம்.\", paid_to_label:\"செலுத்தப்பட்டது\",\n    quiz_scam_option:\"இது மோசடி போல் தெரிகிறது\", quiz_real_option:\"இது உண்மை போல் தெரிகிறது, நான் தட்டுவேன்\", quiz_flags_heading:\"எச்சரிக்கை அறிகுறிகள் விளக்கம்\", quiz_try_another:\"மற்றொரு உதாரணத்தை முயற்சிக்கவும்\",\n    wellness_intro:\"ஆன்லைனில் பாதுகாப்பாக இருப்பது ஒரு தொடர்ச்சியான பழக்கம், ஒரு முறை பாட
